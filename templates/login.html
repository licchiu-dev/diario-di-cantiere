<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accesso – Diario di Cantiere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--c-card-r);
      box-shadow: 0 4px 24px rgba(1,87,155,.10);
      padding: 2.5rem 2rem;
    }
    .login-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #01579b 0%, #0288d1 100%);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="d-flex flex-column align-items-center mb-4">
      <div class="login-logo mb-3">
        <i class="bi bi-building"></i>
      </div>
      <h5 class="fw-bold mb-0">Diario di Cantiere</h5>
      <p class="text-muted small mb-0">Accedi per continuare</p>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>
        Credenziali non valide. Riprova.
      </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">Username</label>
        <input type="text" name="username" class="form-control" autofocus autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-salva w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Accedi
      </button>
    </form>
  </div>
</body>
</html>
