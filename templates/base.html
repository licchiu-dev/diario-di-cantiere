<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Diario di Cantiere{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark dc-navbar">
  <div class="container-xl">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'cantieri_list' %}">
      <i class="bi bi-building"></i>
      <span class="fw-bold">Diario di Cantiere</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'cantieri_list' %}active{% endif %}"
             href="{% url 'cantieri_list' %}">
            <i class="bi bi-geo-alt me-1"></i>Cantieri
          </a>
        </li>
      </ul>
      <a href="{% url 'giornata_create' %}" class="btn btn-nuova ms-2">
        <i class="bi bi-plus-circle me-1"></i>Nuova giornata
      </a>
      <a href="/admin/" class="btn btn-outline-light btn-sm ms-2" target="_blank">
        <i class="bi bi-gear me-1"></i>Admin
      </a>
    </div>
  </div>
</nav>

<div class="container-xl py-4">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show mb-3" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
